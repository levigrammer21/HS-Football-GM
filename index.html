<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HS Football GM</title>
  <style>
    :root {
      --bg: #101418;
      --panel: #171d23;
      --panel-2: #1f2730;
      --panel-3: #26313c;
      --text: #f4f7fb;
      --muted: #9aa8b6;
      --line: #334150;
      --accent: #f5b642;
      --accent-2: #ffdd87;
      --bad: #ff6b6b;
      --good: #3ddc97;
      --blue: #5ab2ff;
      --shadow: 0 10px 30px rgba(0,0,0,.25);
      --radius: 14px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top left, #26313c, var(--bg) 42%);
      color: var(--text);
      min-height: 100vh;
    }

    button, select, input {
      font: inherit;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 9px 12px;
      cursor: pointer;
      color: #101418;
      background: var(--accent);
      font-weight: 700;
      transition: transform .08s ease, opacity .12s ease, background .12s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    .ghost {
      background: transparent;
      border: 1px solid var(--line);
      color: var(--text);
    }

    .danger {
      background: var(--bad);
      color: #fff;
    }

    .good {
      background: var(--good);
      color: #06120c;
    }

    .blue {
      background: var(--blue);
      color: #06121d;
    }

    input, select {
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px 10px;
      outline: none;
      width: 100%;
    }

    .app {
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      background: rgba(16,20,24,.84);
      border-right: 1px solid var(--line);
      padding: 18px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
      backdrop-filter: blur(10px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .logo {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), #8e5d00);
      display: grid;
      place-items: center;
      font-weight: 900;
      color: #111;
      box-shadow: var(--shadow);
    }

    .brand h1 {
      font-size: 19px;
      margin: 0;
      line-height: 1.1;
    }

    .brand small { color: var(--muted); }

    .nav {
      display: grid;
      gap: 7px;
      margin: 18px 0;
    }

    .nav button {
      background: transparent;
      color: var(--muted);
      text-align: left;
      border: 1px solid transparent;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav button.active {
      background: var(--panel-2);
      color: var(--text);
      border-color: var(--line);
    }

    .side-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 13px;
      margin-top: 12px;
    }

    .main {
      padding: 22px;
      min-width: 0;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 18px;
    }

    .topbar h2 {
      margin: 0;
      font-size: 26px;
    }

    .topbar p {
      margin: 5px 0 0;
      color: var(--muted);
    }

    .grid {
      display: grid;
      gap: 14px;
    }

    .grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid.three { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .grid.four { grid-template-columns: repeat(4, minmax(0, 1fr)); }

    .card {
      background: rgba(23,29,35,.92);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 15px;
      box-shadow: var(--shadow);
      min-width: 0;
    }

    .card h3 {
      margin: 0 0 10px;
      font-size: 17px;
    }

    .muted { color: var(--muted); }
    .accent { color: var(--accent); }
    .good-text { color: var(--good); }
    .bad-text { color: var(--bad); }
    .blue-text { color: var(--blue); }

    .row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .between {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 8px;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--muted);
      border-radius: 999px;
      font-size: 12px;
      white-space: nowrap;
    }

    .pill.goodp { color: var(--good); border-color: rgba(61,220,151,.35); }
    .pill.badp { color: var(--bad); border-color: rgba(255,107,107,.35); }
    .pill.gold { color: var(--accent-2); border-color: rgba(245,182,66,.45); }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      overflow: hidden;
    }

    th, td {
      padding: 9px 8px;
      border-bottom: 1px solid rgba(51,65,80,.65);
      text-align: left;
      white-space: nowrap;
    }

    th {
      color: var(--muted);
      font-weight: 700;
      position: sticky;
      top: 0;
      background: var(--panel);
      z-index: 1;
      cursor: pointer;
    }

    tr:hover td {
      background: rgba(255,255,255,.025);
    }

    .table-wrap {
      overflow: auto;
      max-height: 65vh;
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }

    .player-name {
      color: var(--accent-2);
      font-weight: 800;
      cursor: pointer;
    }

    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .tabs button {
      background: var(--panel-2);
      color: var(--muted);
      border: 1px solid var(--line);
    }

    .tabs button.active {
      color: #101418;
      background: var(--accent);
      border-color: var(--accent);
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 8px;
    }

    .stat-line {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }

    .meter {
      width: 100%;
      height: 8px;
      border-radius: 999px;
      background: #0c1014;
      overflow: hidden;
      border: 1px solid var(--line);
    }

    .meter span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, #d74d4d, #e8c84f, #3ddc97);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.65);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 50;
    }

    .modal-backdrop.show { display: flex; }

    .modal {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      width: min(1040px, 100%);
      max-height: 92vh;
      overflow: auto;
      box-shadow: 0 30px 80px rgba(0,0,0,.55);
    }

    .modal-header {
      padding: 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      position: sticky;
      top: 0;
      background: var(--panel);
      z-index: 2;
    }

    .modal-body { padding: 16px; }

    .depth-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .pos-row {
      display: grid;
      grid-template-columns: 64px minmax(0, 1fr) 74px;
      gap: 8px;
      align-items: center;
      padding: 7px 0;
      border-bottom: 1px solid rgba(51,65,80,.5);
    }

    .game-log {
      display: grid;
      gap: 7px;
      max-height: 360px;
      overflow: auto;
    }

    .log-line {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px;
      color: var(--muted);
    }

    .schedule-game {
      display: grid;
      grid-template-columns: 72px 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border: 1px solid var(--line);
      background: var(--panel-2);
      border-radius: 12px;
    }

    .record-card {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      display: grid;
      gap: 8px;
      z-index: 99;
    }

    .toast div {
      background: #0f1419;
      border: 1px solid var(--line);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 12px;
      box-shadow: var(--shadow);
    }

    .small { font-size: 12px; }
    .hide { display: none !important; }

    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
      .sidebar {
        position: static;
        height: auto;
      }
      .nav { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .grid.two, .grid.three, .grid.four, .depth-grid { grid-template-columns: 1fr; }
      .topbar { flex-direction: column; }
      .main { padding: 14px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">HS</div>
        <div>
          <h1>HS Football GM</h1>
          <small>Stroud Tigers Dynasty</small>
        </div>
      </div>

      <div class="nav" id="nav"></div>

      <div class="side-card">
        <div class="between">
          <strong id="saveName">No Save</strong>
          <span class="pill gold" id="seasonPill">----</span>
        </div>
        <p class="muted small" id="saveMeta">Create or load a save.</p>
        <div class="grid" style="gap:8px;">
          <button id="newSaveBtn">New Dynasty</button>
          <button class="ghost" id="saveCloudBtn">Save to Firebase</button>
          <button class="ghost" id="loadCloudBtn">Load Firebase Save</button>
          <button class="ghost" id="exportBtn">Export JSON</button>
          <button class="ghost" id="importBtn">Import JSON</button>
          <input type="file" id="importFile" class="hide" accept="application/json" />
        </div>
      </div>

      <div class="side-card">
        <strong>Coach Tip</strong>
        <p class="muted small" id="coachTip">Players can play anywhere. The sim will judge your choices.</p>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div>
          <h2 id="pageTitle">Dashboard</h2>
          <p id="pageSubtitle">Build the program. Develop the players. Win state.</p>
        </div>
        <div class="row">
          <button class="blue" id="quickSaveBtn">Local Save</button>
          <button class="good" id="advanceBtn">Advance Week</button>
        </div>
      </div>
      <section id="view"></section>
    </main>
  </div>

  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <div class="modal-header">
        <div>
          <strong id="modalTitle">Player</strong>
          <div class="muted small" id="modalSub"></div>
        </div>
        <button class="ghost" id="closeModalBtn">Close</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getFirestore,
      doc,
      getDoc,
      setDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
    import {
      getAuth,
      signInAnonymously,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBaoJBBCvvGL3SS4geVO8jhTL47inuzank",
      authDomain: "hs-football-gm.firebaseapp.com",
      projectId: "hs-football-gm",
      storageBucket: "hs-football-gm.firebasestorage.app",
      messagingSenderId: "472368284803",
      appId: "1:472368284803:web:b0cabd6331c90661f147b6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let userId = null;
    onAuthStateChanged(auth, user => {
      userId = user?.uid || null;
      if (userId) toast("Firebase connected.");
    });
    signInAnonymously(auth).catch(err => toast("Firebase auth failed: " + err.message));

    const DISTRICTS = {
      "2A-II-1": ["Bethel", "Blackwell", "Cascia Hall", "Chisholm", "Crooked Oak", "Dewey", "Kiefer", "Perry"],
      "2A-II-2": ["Anadarko", "Casady", "Chandler", "Crossings Christian", "Dickson", "Lindsay", "Little Axe", "Washington"],
      "2A-II-3": ["Adair", "Chelsea", "Chouteau-Mazie", "Kansas", "Keys Parkhill", "KIPP Tulsa", "Salina", "Wyandotte"],
      "2A-II-4": ["Atoka", "Beggs", "Hartshorne", "Holdenville", "Kellyville", "Morris", "Stroud", "Wilburton"]
    };

    const STRONG_RIVALS = ["Chandler", "Prague", "Depew", "Davenport"];
    const EXTRA_TEAMS = ["Prague", "Depew", "Davenport"];

    const OFFENSES = ["Spread", "Air Raid", "Pro Style", "Option", "Wing-T", "Power-I", "Flexbone", "Wishbone"];
    const DEFENSES = ["4-3", "3-4", "4-4", "3-3-5", "5-2", "Nickel", "Bear"];

    const OFF_POS = ["QB", "RB", "FB", "WR1", "WR2", "WR3", "TE", "LT", "LG", "C", "RG", "RT"];
    const DEF_POS = ["LE", "DT1", "DT2", "RE", "OLB1", "MLB", "OLB2", "CB1", "CB2", "FS", "SS"];
    const ST_POS = ["K", "P", "KR", "PR"];
    const ALL_POS = [...OFF_POS, ...DEF_POS, ...ST_POS];

    const VISIBLE_STATS = [
      "speed", "acceleration", "strength", "agility", "stamina",
      "armStrength", "throwAccuracy", "catching", "ballCarrying",
      "blocking", "tackling", "coverage", "vision", "pursuit",
      "kickPower", "kickAccuracy"
    ];

    const STAT_LABEL = {
      speed: "Speed",
      acceleration: "Accel",
      strength: "Strength",
      agility: "Agility",
      stamina: "Stamina",
      armStrength: "Arm Str",
      throwAccuracy: "Throw Acc",
      catching: "Catching",
      ballCarrying: "Carry",
      blocking: "Blocking",
      tackling: "Tackling",
      coverage: "Coverage",
      vision: "Vision",
      pursuit: "Pursuit",
      kickPower: "Kick Power",
      kickAccuracy: "Kick Acc"
    };

    const FIRST = ["Tyler","Mason","Eli","Cooper","Jaxon","Wyatt","Easton","Logan","Carson","Carter","Hudson","Brayden","Colton","Gavin","Brody","Tucker","Ryder","Asher","Kaden","Noah","Owen","Landon","Hayden","Parker","Blake","Dylan","Austin","Hunter","Chase","Grant","Marcus","Jayden","Malik","Trey","Darius","Caleb","Isaiah","Micah","Andre","Nolan","Brock","Gunner"];
    const LAST = ["Jones","Smith","Brown","Davis","Miller","Wilson","Moore","Taylor","Anderson","Thomas","Jackson","White","Harris","Martin","Thompson","Garcia","Martinez","Robinson","Clark","Lewis","Walker","Hall","Allen","Young","King","Wright","Scott","Green","Baker","Adams","Nelson","Hill","Carter","Mitchell","Perez","Roberts","Turner","Phillips","Campbell","Parker"];

    const TIPS = [
      "A clutch gamer is a lottery ticket.",
      "At a small school, reps are your real currency.",
      "Bad fits are allowed. Bad fits just have consequences.",
      "Film study reveals IQ faster. Scrimmage reveals gamer faster.",
      "Wing-T can hide a weak passer, but it cannot hide poor blocking forever.",
      "A freshman who looks average may grow into a senior monster.",
      "Two-way stars win games, but fatigue can steal the fourth quarter."
    ];

    let state = null;
    let currentView = "dashboard";
    let rosterSort = { key: "name", dir: 1 };
    let firebaseSlot = "main";

    function clamp(n, min=0, max=100) { return Math.max(min, Math.min(max, n)); }
    function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
    function choice(arr) { return arr[rand(0, arr.length - 1)]; }
    function id(prefix="id") { return prefix + "_" + Math.random().toString(36).slice(2, 10); }
    function round1(n) { return Math.round(n * 10) / 10; }
    function avg(arr) { return arr.length ? arr.reduce((a,b)=>a+b,0) / arr.length : 0; }
    function sum(arr) { return arr.reduce((a,b)=>a+b,0); }
    function pct(n) { return Math.round(n) + "%"; }

    function bell(mean=50, sd=15, min=1, max=99) {
      let u = 0, v = 0;
      while (u === 0) u = Math.random();
      while (v === 0) v = Math.random();
      const z = Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
      return Math.round(clamp(mean + z * sd, min, max));
    }

    function saveLocal() {
      if (!state) return;
      localStorage.setItem("hsfg_save", JSON.stringify(state));
      toast("Saved locally.");
      render();
    }

    function loadLocal() {
      const raw = localStorage.getItem("hsfg_save");
      if (!raw) return false;
      try {
        state = JSON.parse(raw);
        migrateState();
        return true;
      } catch {
        return false;
      }
    }

    async function saveCloud() {
      if (!state || !userId) return toast("Firebase is not ready.");
      await setDoc(doc(db, "users", userId, "saves", firebaseSlot), {
        name: state.name,
        updatedAt: serverTimestamp(),
        gameState: state
      });
      toast("Saved to Firebase.");
    }

    async function loadCloud() {
      if (!userId) return toast("Firebase is not ready.");
      const snap = await getDoc(doc(db, "users", userId, "saves", firebaseSlot));
      if (!snap.exists()) return toast("No Firebase save found.");
      state = snap.data().gameState;
      migrateState();
      saveLocal();
      currentView = "dashboard";
      render();
      toast("Loaded Firebase save.");
    }

    function migrateState() {
      if (!state.version) state.version = 1;
      state.records ||= createEmptyRecords();
      state.history ||= [];
      state.news ||= [];
      state.settings ||= { offense: "Wing-T", defense: "4-4", offFocus: "Balanced", defFocus: "Balanced", teamFocus: "Position Drills" };
      for (const p of state.players || []) {
        p.positionsTried ||= {};
        p.notes ||= [];
        p.seasonStats ||= emptyPlayerStats();
        p.careerStats ||= emptyPlayerStats();
        p.position ||= "ATH";
        p.injuredWeeks ||= 0;
      }
    }

    function createNewDynasty() {
      const year = 2027;
      const teams = createTeams();
      const players = generateInitialRoster();
      const depth = autoDepth(players);
      state = {
        version: 1,
        name: "Stroud Tigers",
        userTeamId: "team_stroud",
        seasonYear: year,
        week: 1,
        phase: "regular",
        teams,
        players,
        depth,
        schedule: createSchedule(year, teams),
        settings: { offense: "Wing-T", defense: "4-4", offFocus: "Balanced", defFocus: "Balanced", teamFocus: "Position Drills" },
        records: createEmptyRecords(),
        history: [],
        news: ["Welcome to Stroud. You get what walks through the doors. Win state."],
        lastGameLog: []
      };
      recalcTeamRatings();
      saveLocal();
      toast("New dynasty created.");
      currentView = "dashboard";
      render();
    }

    function createTeams() {
      const teams = [];
      for (const [district, names] of Object.entries(DISTRICTS)) {
        for (const name of names) {
          teams.push(makeTeam(name, district));
        }
      }
      for (const name of EXTRA_TEAMS) {
        teams.push(makeTeam(name, "Rival"));
      }
      return teams.map(t => {
        if (t.name === "Stroud") {
          t.id = "team_stroud";
          t.mascot = "Tigers";
          t.primary = true;
          t.power = 52;
          t.offense = "Wing-T";
          t.defense = "4-4";
        }
        return t;
      });
    }

    function makeTeam(name, district) {
      const mascots = ["Tigers","Bulldogs","Eagles","Warriors","Wildcats","Panthers","Lions","Raiders","Longhorns","Indians","Comets","Hornets"];
      return {
        id: "team_" + name.toLowerCase().replace(/[^a-z0-9]+/g, "_"),
        name,
        mascot: choice(mascots),
        district,
        offense: choice(OFFENSES),
        defense: choice(DEFENSES),
        power: bell(50, 13, 25, 85),
        offenseRating: 50,
        defenseRating: 50,
        record: { wins: 0, losses: 0, districtWins: 0, districtLosses: 0, pf: 0, pa: 0 },
        history: []
      };
    }

    function createSchedule(year, teams) {
      const games = [];
      const stroud = "team_stroud";
      const fixed = ["Chandler", "Prague", "Depew", "Davenport"];
      let week = 1;
      for (const oppName of fixed) {
        const opp = teams.find(t => t.name === oppName);
        games.push(makeGame(year, week++, stroud, opp.id, oppName === "Chandler" || oppName === "Prague"));
      }
      const districtOpps = DISTRICTS["2A-II-4"].filter(n => n !== "Stroud");
      const six = shuffle(districtOpps).slice(0, 6);
      for (const oppName of six) {
        const opp = teams.find(t => t.name === oppName);
        games.push(makeGame(year, week++, stroud, opp.id, true));
      }

      // Background games for standings flavor.
      for (let w = 1; w <= 10; w++) {
        const grouped = Object.values(DISTRICTS).flatMap(names => shuffle(names).map(n => teams.find(t => t.name === n)).filter(Boolean));
        for (let i = 0; i < grouped.length - 1; i += 2) {
          if (grouped[i].id === stroud || grouped[i+1].id === stroud) continue;
          if (Math.random() < 0.55) games.push(makeGame(year, w, grouped[i].id, grouped[i+1].id, grouped[i].district === grouped[i+1].district));
        }
      }
      return games;
    }

    function makeGame(year, week, homeId, awayId, district=false) {
      return { id: id("game"), year, week, homeId, awayId, district, played: false, homeScore: null, awayScore: null, log: [] };
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = rand(0, i);
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function generateInitialRoster() {
      const players = [];
      const gradeCounts = { FR: rand(8, 12), SO: rand(9, 13), JR: rand(9, 13), SR: rand(8, 12) };
      for (const [grade, count] of Object.entries(gradeCounts)) {
        for (let i = 0; i < count; i++) players.push(generatePlayer(grade));
      }
      return players;
    }

    function generateFreshmen() {
      const count = rand(6, 12);
      const players = [];
      for (let i = 0; i < count; i++) players.push(generatePlayer("FR"));
      return players;
    }

    function generatePlayer(grade="FR") {
      const archetype = choice(["athlete","lineman","skill","qb","defender","kicker"]);
      const ageBoost = { FR: 0, SO: 5, JR: 9, SR: 13 }[grade] || 0;
      const genetics = bell(55, 18, 1, 99);
      const workEthic = bell(55, 18, 1, 99);
      const iq = bell(52, 17, 1, 99);
      const gamer = Math.random() < 0.22;
      const clutch = Math.random() < 0.12;

      let height = rand(65, 73);
      let weight = rand(130, 205);
      if (archetype === "lineman") { height = rand(68, 76); weight = rand(210, 285); }
      if (archetype === "skill") { height = rand(66, 73); weight = rand(140, 190); }
      if (archetype === "qb") { height = rand(68, 75); weight = rand(155, 205); }
      if (archetype === "defender") { height = rand(67, 74); weight = rand(160, 230); }
      if (archetype === "kicker") { height = rand(66, 74); weight = rand(140, 200); }

      const base = {};
      for (const s of VISIBLE_STATS) base[s] = bell(45 + ageBoost, 14, 15, 90);

      if (archetype === "lineman") {
        base.strength += 22; base.blocking += 24; base.tackling += 9; base.speed -= 18; base.agility -= 12; base.ballCarrying -= 15; base.throwAccuracy -= 15;
      }
      if (archetype === "skill") {
        base.speed += 18; base.acceleration += 16; base.agility += 16; base.catching += 14; base.ballCarrying += 10; base.strength -= 7;
      }
      if (archetype === "qb") {
        base.armStrength += 20; base.throwAccuracy += 18; base.vision += 12; base.ballCarrying += 3;
      }
      if (archetype === "defender") {
        base.tackling += 18; base.pursuit += 15; base.coverage += 9; base.strength += 5;
      }
      if (archetype === "kicker") {
        base.kickPower += 25; base.kickAccuracy += 22; base.tackling -= 20; base.blocking -= 20;
      }

      for (const s of VISIBLE_STATS) base[s] = clamp(base[s], 10, 96);

      const p = {
        id: id("p"),
        name: uniqueName(),
        grade,
        height,
        weight,
        position: recommendPositions(base, height, weight)[0],
        stats: base,
        hidden: {
          gamer,
          clutch,
          footballIQ: iq,
          workEthic,
          genetics
        },
        knowledge: {
          gamer: { known: 0, min: 0, max: 100 },
          clutch: { known: 0, min: 0, max: 100 },
          footballIQ: { known: 0, min: 0, max: 100 },
          workEthic: { known: 0, min: 0, max: 100 },
          genetics: { known: 0, min: 0, max: 100 }
        },
        positionsTried: {},
        notes: [],
        injuredWeeks: 0,
        seasonStats: emptyPlayerStats(),
        careerStats: emptyPlayerStats()
      };

      revealTrait(p, "workEthic", rand(3, 12));
      revealTrait(p, "genetics", rand(2, 8));
      p.notes.push("Arrived as a " + archetype + " type. Staff is still figuring out his best role.");
      return p;
    }

    const usedNames = new Set();
    function uniqueName() {
      let n = choice(FIRST) + " " + choice(LAST);
      let tries = 0;
      while (usedNames.has(n) && tries < 20) {
        n = choice(FIRST) + " " + choice(LAST);
        tries++;
      }
      usedNames.add(n);
      return n;
    }

    function emptyPlayerStats() {
      return {
        passYards: 0, passTD: 0, interceptionsThrown: 0,
        rushYards: 0, rushTD: 0,
        recYards: 0, recTD: 0, catches: 0,
        tackles: 0, sacks: 0, interceptions: 0,
        fgMade: 0, fgAtt: 0, xpMade: 0,
        games: 0
      };
    }

    function createEmptyRecords() {
      return {
        season: {},
        career: {},
        teamSeasons: []
      };
    }

    function recommendPositions(stats, height, weight) {
      const scores = {};
      for (const pos of ["QB","RB","FB","WR","TE","OL","DL","LB","CB","S","K"]) {
        scores[pos] = positionFitRaw(pos, stats, height, weight, { footballIQ: 50, gamer: false, clutch: false }, false);
      }
      return Object.entries(scores).sort((a,b)=>b[1]-a[1]).slice(0,3).map(x=>x[0]);
    }

    function positionFitRaw(pos, s, h, w, hidden, includeHidden=true) {
      const iq = includeHidden ? hidden.footballIQ : 50;
      const gamer = includeHidden && hidden.gamer ? 4 : 0;
      let score = 50;
      const wt = (...pairs) => pairs.reduce((a,[key,val]) => a + (s[key] || 0) * val, 0) / pairs.reduce((a,p)=>a+p[1],0);
      if (pos === "QB") score = wt(["armStrength",2],["throwAccuracy",3],["vision",2],["agility",1],["ballCarrying",1]) + iq * .12;
      else if (pos === "RB") score = wt(["speed",2],["acceleration",2],["agility",2],["ballCarrying",3],["vision",1],["strength",1]);
      else if (pos === "FB") score = wt(["strength",2],["blocking",3],["ballCarrying",1],["tackling",1]) + Math.min(w,230)*.05;
      else if (pos === "WR" || pos === "WR1" || pos === "WR2" || pos === "WR3") score = wt(["speed",3],["acceleration",2],["agility",2],["catching",3],["vision",1]);
      else if (pos === "TE") score = wt(["catching",2],["blocking",3],["strength",2],["speed",1]) + Math.min(w,240)*.04;
      else if (["LT","LG","C","RG","RT","OL"].includes(pos)) score = wt(["strength",3],["blocking",4],["stamina",1]) + Math.min(w,300)*.07 - Math.max(0, 68-h)*1.3;
      else if (["LE","RE","DT1","DT2","DL"].includes(pos)) score = wt(["strength",3],["tackling",2],["pursuit",1],["stamina",1]) + Math.min(w,285)*.06;
      else if (["MLB","OLB1","OLB2","LB"].includes(pos)) score = wt(["tackling",3],["pursuit",3],["strength",1],["speed",1],["vision",1]) + iq * .08;
      else if (["CB1","CB2","CB"].includes(pos)) score = wt(["speed",3],["acceleration",2],["agility",2],["coverage",3],["tackling",1]);
      else if (["FS","SS","S"].includes(pos)) score = wt(["speed",2],["coverage",2],["tackling",2],["pursuit",2],["vision",2]) + iq * .1;
      else if (["K","P"].includes(pos)) score = wt(["kickPower",3],["kickAccuracy",3]);
      else if (["KR","PR"].includes(pos)) score = wt(["speed",3],["acceleration",2],["agility",2],["ballCarrying",2],["vision",1]);
      return clamp(score + gamer, 1, 99);
    }

    function positionFit(player, pos) {
      return positionFitRaw(normalizePos(pos), player.stats, player.height, player.weight, player.hidden, true);
    }

    function normalizePos(pos) {
      if (["WR1","WR2","WR3"].includes(pos)) return "WR";
      if (["LT","LG","C","RG","RT"].includes(pos)) return "OL";
      if (["LE","RE","DT1","DT2"].includes(pos)) return "DL";
      if (["MLB","OLB1","OLB2"].includes(pos)) return "LB";
      if (["CB1","CB2"].includes(pos)) return "CB";
      if (["FS","SS"].includes(pos)) return "S";
      return pos;
    }

    function autoDepth(players) {
      const depth = {};
      for (const pos of ALL_POS) {
        const sorted = [...players].sort((a,b) => positionFit(b,pos) - positionFit(a,pos));
        depth[pos] = sorted[0]?.id || null;
      }
      return depth;
    }

    function getPlayer(id) { return state.players.find(p => p.id === id); }
    function getTeam(id) { return state.teams.find(t => t.id === id); }

    function recalcTeamRatings() {
      if (!state) return;
      const userTeam = getTeam(state.userTeamId);
      if (!userTeam) return;
      const offense = avg(OFF_POS.map(pos => {
        const p = getPlayer(state.depth[pos]);
        if (!p) return 30;
        return positionFit(p, pos) * fatigueModifier(p, pos);
      }));
      const defense = avg(DEF_POS.map(pos => {
        const p = getPlayer(state.depth[pos]);
        if (!p) return 30;
        return positionFit(p, pos) * fatigueModifier(p, pos);
      }));
      userTeam.offenseRating = round1(offense + schemeBonus("offense"));
      userTeam.defenseRating = round1(defense + schemeBonus("defense"));
      userTeam.power = round1((userTeam.offenseRating + userTeam.defenseRating) / 2);

      for (const team of state.teams) {
        if (team.id === state.userTeamId) continue;
        const drift = rand(-2,2);
        team.offenseRating = clamp(team.power + drift + rand(-4,4), 15, 95);
        team.defenseRating = clamp(team.power - drift + rand(-4,4), 15, 95);
      }
    }

    function fatigueModifier(player, pos) {
      const assignments = Object.entries(state.depth).filter(([,pid]) => pid === player.id).length;
      let mod = 1;
      if (assignments >= 2) mod -= Math.max(0, (assignments - 1) * .035);
      if (player.stats.stamina < 55 && assignments >= 2) mod -= .04;
      if (player.injuredWeeks > 0) mod -= .2;
      return clamp(mod, .65, 1.05);
    }

    function schemeBonus(side) {
      const p = state.players;
      const d = state.depth;
      const offense = state.settings.offense;
      const defense = state.settings.defense;
      if (side === "offense") {
        const qb = getPlayer(d.QB), rb = getPlayer(d.RB);
        const ol = ["LT","LG","C","RG","RT"].map(x=>getPlayer(d[x])).filter(Boolean);
        const wr = ["WR1","WR2","WR3"].map(x=>getPlayer(d[x])).filter(Boolean);
        if (!qb || !rb) return 0;
        if (offense === "Wing-T") return (avg(ol.map(x=>x.stats.blocking)) - 55) * .04 + (rb.stats.ballCarrying - 55) * .035 + (qb.stats.agility - 50) * .025;
        if (offense === "Air Raid") return (qb.stats.throwAccuracy - 55) * .06 + (avg(wr.map(x=>x.stats.catching + x.stats.speed)) / 2 - 55) * .05;
        if (offense === "Spread") return (qb.stats.throwAccuracy + qb.stats.agility - 105) * .035 + (avg(wr.map(x=>x.stats.speed)) - 55) * .04;
        if (offense === "Option" || offense === "Flexbone" || offense === "Wishbone") return (qb.stats.ballCarrying + qb.stats.agility - 100) * .05 + (avg(ol.map(x=>x.stats.blocking)) - 55) * .04;
        if (offense === "Power-I") return (avg(ol.map(x=>x.stats.strength + x.stats.blocking)) / 2 - 55) * .05 + (rb.stats.strength - 50) * .03;
        if (offense === "Pro Style") return (qb.stats.throwAccuracy - 55) * .035 + (avg(ol.map(x=>x.stats.blocking)) - 55) * .035;
      } else {
        const dl = ["LE","DT1","DT2","RE"].map(x=>getPlayer(d[x])).filter(Boolean);
        const lb = ["OLB1","MLB","OLB2"].map(x=>getPlayer(d[x])).filter(Boolean);
        const db = ["CB1","CB2","FS","SS"].map(x=>getPlayer(d[x])).filter(Boolean);
        if (defense === "4-4") return (avg(lb.map(x=>x.stats.tackling + x.stats.pursuit)) / 2 - 55) * .05;
        if (defense === "3-3-5") return (avg(db.map(x=>x.stats.speed + x.stats.coverage)) / 2 - 55) * .06;
        if (defense === "5-2") return (avg(dl.map(x=>x.stats.strength + x.stats.tackling)) / 2 - 55) * .06;
        if (defense === "Nickel") return (avg(db.map(x=>x.stats.coverage)) - 55) * .07;
        if (defense === "Bear") return (avg(dl.map(x=>x.stats.strength)) - 55) * .07;
        if (defense === "4-3") return (avg(dl.map(x=>x.stats.tackling)) - 55) * .035 + (avg(lb.map(x=>x.stats.pursuit)) - 55) * .035;
        if (defense === "3-4") return (avg(lb.map(x=>x.stats.tackling + x.stats.pursuit)) / 2 - 55) * .05;
      }
      return 0;
    }

    function advanceWeek() {
      if (!state) return createNewDynasty();
      if (state.week <= 10) {
        runWeek(state.week);
        state.week++;
        if (state.week === 11) {
          state.phase = "playoffs";
          generatePlayoffSchedule();
        }
      } else if (state.phase === "playoffs") {
        runPlayoffRound();
      } else {
        startNextSeason();
      }
      saveLocal();
      render();
    }

    function runWeek(week) {
      recalcTeamRatings();
      const games = state.schedule.filter(g => g.week === week && !g.played);
      for (const g of games) simGame(g);
      practiceWeek();
      updateRecords();
      state.news.unshift("Week " + week + " complete. " + weekSummary(week));
      state.news = state.news.slice(0, 30);
    }

    function simGame(game) {
      const home = getTeam(game.homeId);
      const away = getTeam(game.awayId);
      const userInGame = game.homeId === state.userTeamId || game.awayId === state.userTeamId;
      let homePower = (home.offenseRating + home.defenseRating) / 2 + 2;
      let awayPower = (away.offenseRating + away.defenseRating) / 2;
      const diff = homePower - awayPower;
      let homeScore = clamp(Math.round(23 + diff * .35 + bell(0, 8, -20, 20)), 0, 70);
      let awayScore = clamp(Math.round(22 - diff * .35 + bell(0, 8, -20, 20)), 0, 70);
      if (homeScore === awayScore) Math.random() < .5 ? homeScore += rand(1,7) : awayScore += rand(1,7);

      game.homeScore = homeScore;
      game.awayScore = awayScore;
      game.played = true;

      applyTeamResult(home, away, homeScore, awayScore, game.district);
      game.log = createGameLog(home, away, homeScore, awayScore);

      if (userInGame) {
        state.lastGameLog = game.log;
        distributeUserStats(game, homeScore, awayScore);
        discoverFromGame(game);
      }
    }

    function applyTeamResult(home, away, hs, as, district) {
      home.record.pf += hs; home.record.pa += as;
      away.record.pf += as; away.record.pa += hs;
      if (hs > as) { home.record.wins++; away.record.losses++; }
      else { away.record.wins++; home.record.losses++; }
      if (district) {
        if (hs > as) { home.record.districtWins++; away.record.districtLosses++; }
        else { away.record.districtWins++; home.record.districtLosses++; }
      }
    }

    function createGameLog(home, away, hs, as) {
      const winner = hs > as ? home : away;
      const loser = hs > as ? away : home;
      return [
        `Kickoff: ${home.name} vs ${away.name}.`,
        `${winner.name} opened the game with better field position.`,
        `Halftime adjustments favored ${choice([home.name, away.name])}.`,
        `Fourth quarter pressure tested both sidelines.`,
        `Final: ${home.name} ${hs}, ${away.name} ${as}. ${winner.name} beat ${loser.name}.`
      ];
    }

    function distributeUserStats(game, hs, as) {
      const userHome = game.homeId === state.userTeamId;
      const points = userHome ? hs : as;
      const oppPoints = userHome ? as : hs;
      const d = state.depth;
      const qb = getPlayer(d.QB);
      const rb = getPlayer(d.RB);
      const wrs = ["WR1","WR2","WR3","TE"].map(x=>getPlayer(d[x])).filter(Boolean);
      const defenders = DEF_POS.map(x=>getPlayer(d[x])).filter(Boolean);
      const k = getPlayer(d.K);

      const passLeaning = ["Air Raid","Spread","Pro Style"].includes(state.settings.offense);
      const runLeaning = ["Wing-T","Power-I","Option","Flexbone","Wishbone"].includes(state.settings.offense);
      const passYards = Math.max(0, Math.round((passLeaning ? rand(110, 290) : rand(40, 160)) * (points + 12) / 35));
      const rushYards = Math.max(0, Math.round((runLeaning ? rand(150, 360) : rand(60, 210)) * (points + 12) / 35));
      const passTD = Math.min(Math.floor(points / 7), passLeaning ? rand(1,4) : rand(0,2));
      const rushTD = Math.min(Math.floor(points / 7), runLeaning ? rand(1,4) : rand(0,2));

      if (qb) {
        addStats(qb, { games:1, passYards, passTD, interceptionsThrown: rand(0, qb.stats.throwAccuracy < 50 ? 3 : 1), rushYards: runLeaning ? Math.round(rushYards * .25) : rand(-8, 30), rushTD: runLeaning && Math.random()<.35 ? 1 : 0 });
      }
      if (rb) addStats(rb, { games:1, rushYards: Math.round(rushYards * .55), rushTD, catches: passLeaning ? rand(1,5) : rand(0,2), recYards: passLeaning ? rand(5,45) : rand(0,20) });
      for (const wr of wrs) {
        const share = Math.random() * .35 + .12;
        addStats(wr, { games:1, catches: Math.max(0, Math.round(passYards * share / 12)), recYards: Math.round(passYards * share), recTD: Math.random()<.33 ? 1 : 0 });
      }
      for (const def of defenders) {
        addStats(def, { games:1, tackles: rand(2,11), sacks: Math.random()<.18 ? 1 : 0, interceptions: Math.random()<.12 ? 1 : 0 });
      }
      if (k) {
        const xp = Math.floor(points / 7);
        addStats(k, { games:1, xpMade: xp, fgAtt: Math.random()<.35 ? 1 : 0, fgMade: Math.random()<.25 ? 1 : 0 });
      }

      for (const pos of ALL_POS) {
        const p = getPlayer(state.depth[pos]);
        if (!p) continue;
        p.positionsTried[pos] = (p.positionsTried[pos] || 0) + 1;
      }

      const notable = chooseNotablePlayer(points, oppPoints);
      if (notable) {
        notable.notes.unshift(makeGameNote(notable));
        notable.notes = notable.notes.slice(0, 14);
      }
    }

    function addStats(player, delta) {
      for (const [k,v] of Object.entries(delta)) {
        player.seasonStats[k] = (player.seasonStats[k] || 0) + v;
        player.careerStats[k] = (player.careerStats[k] || 0) + v;
      }
    }

    function chooseNotablePlayer(points, oppPoints) {
      const starters = [...new Set(Object.values(state.depth))].map(getPlayer).filter(Boolean);
      const weighted = starters.map(p => {
        let w = 5;
        if (p.hidden.gamer) w += 8;
        if (p.hidden.clutch && Math.abs(points - oppPoints) <= 10) w += 8;
        w += p.hidden.footballIQ / 25;
        return { p, w };
      });
      let roll = Math.random() * sum(weighted.map(x=>x.w));
      for (const x of weighted) {
        roll -= x.w;
        if (roll <= 0) return x.p;
      }
      return choice(starters);
    }

    function makeGameNote(p) {
      if (p.hidden.gamer && Math.random()<.55) return "Looked different under the lights. Staff is starting to trust him on Fridays.";
      if (p.hidden.clutch && Math.random()<.45) return "Made a key play late when the game tightened up.";
      if (p.hidden.footballIQ > 72) return "Handled adjustments well and rarely looked out of position.";
      if (p.hidden.workEthic > 75) return "Practice habits seem to be carrying into game night.";
      return choice(["Made several useful plays in his current role.", "Showed flashes but still needs more reps.", "Staff wants more film before drawing conclusions."]);
    }

    function discoverFromGame(game) {
      const starters = [...new Set(Object.values(state.depth))].map(getPlayer).filter(Boolean);
      for (const p of starters) {
        revealTrait(p, "gamer", rand(4, 10));
        if (Math.abs(game.homeScore - game.awayScore) <= 14 || state.phase === "playoffs") revealTrait(p, "clutch", rand(4, 11));
        revealTrait(p, "footballIQ", rand(2, 7));
      }
    }

    function practiceWeek() {
      const focus = state.settings.teamFocus;
      for (const p of state.players) {
        if (p.injuredWeeks > 0) {
          p.injuredWeeks--;
          continue;
        }
        const we = p.hidden.workEthic / 100;
        const gen = p.hidden.genetics / 100;
        const baseGain = Math.max(0, (we * .45 + gen * .25 + Math.random() * .45));
        let targets = [];
        if (focus === "Weight Room") targets = ["strength","blocking","tackling"];
        else if (focus === "Conditioning") targets = ["stamina","speed","acceleration"];
        else if (focus === "Film Study") targets = ["vision","coverage","throwAccuracy","pursuit"];
        else if (focus === "Scrimmage") targets = ["ballCarrying","catching","tackling","coverage","agility"];
        else targets = VISIBLE_STATS.slice();

        for (const s of shuffle(targets).slice(0, focus === "Position Drills" ? 4 : 3)) {
          const ceiling = 55 + p.hidden.genetics * .45 + (p.hidden.workEthic * .15);
          if (p.stats[s] < ceiling) p.stats[s] = round1(clamp(p.stats[s] + baseGain * Math.random(), 1, 99));
        }

        if (focus === "Film Study") revealTrait(p, "footballIQ", rand(3, 8));
        if (focus === "Scrimmage") { revealTrait(p, "gamer", rand(2, 6)); revealTrait(p, "clutch", rand(1, 4)); }
        if (focus === "Weight Room") revealTrait(p, "workEthic", rand(2, 6));
        if (focus === "Conditioning") revealTrait(p, "genetics", rand(1, 4));

        if (focus === "Scrimmage" && Math.random() < .015) {
          p.injuredWeeks = rand(1, 3);
          p.notes.unshift("Picked up a minor injury during scrimmage work.");
        }
      }
      recalcTeamRatings();
    }

    function revealTrait(player, trait, amount) {
      const k = player.knowledge[trait];
      k.known = clamp(k.known + amount, 0, 98);
      let actual;
      if (trait === "gamer") actual = player.hidden.gamer ? rand(74, 96) : rand(5, 58);
      else if (trait === "clutch") actual = player.hidden.clutch ? rand(76, 97) : rand(3, 60);
      else actual = player.hidden[trait];

      const width = Math.max(4, 100 - k.known);
      k.min = clamp(Math.round(actual - width / 2 - rand(0, 5)), 0, 100);
      k.max = clamp(Math.round(actual + width / 2 + rand(0, 5)), 0, 100);
      if (k.min > k.max) [k.min, k.max] = [k.max, k.min];
    }

    function generatePlayoffSchedule() {
      const userTeam = getTeam(state.userTeamId);
      const qualified = userTeam.record.wins >= 6 || userTeam.record.districtWins >= 4;
      if (!qualified) {
        state.phase = "offseason";
        state.news.unshift("Stroud missed the playoffs. Offseason begins.");
        finalizeSeason(false);
        return;
      }
      state.playoffRound = 1;
      state.news.unshift("Stroud made the playoffs. Round 1 is here.");
      createUserPlayoffGame("Round 1");
    }

    function createUserPlayoffGame(label) {
      const candidates = state.teams.filter(t => t.id !== state.userTeamId);
      const opp = choice(candidates.sort((a,b)=>Math.abs(a.power - getTeam(state.userTeamId).power) - Math.abs(b.power - getTeam(state.userTeamId).power)).slice(0, 10));
      state.schedule.push({
        id: id("playoff"),
        year: state.seasonYear,
        week: 10 + state.playoffRound,
        homeId: Math.random()<.5 ? state.userTeamId : opp.id,
        awayId: Math.random()<.5 ? opp.id : state.userTeamId,
        district: false,
        playoff: true,
        label,
        played: false,
        homeScore: null,
        awayScore: null,
        log: []
      });
    }

    function runPlayoffRound() {
      const game = state.schedule.find(g => g.playoff && !g.played);
      if (!game) return startNextSeason();
      simGame(game);
      const userWon = (game.homeId === state.userTeamId && game.homeScore > game.awayScore) || (game.awayId === state.userTeamId && game.awayScore > game.homeScore);
      if (!userWon) {
        state.news.unshift("Playoff run ended in Round " + state.playoffRound + ".");
        finalizeSeason(false);
        state.phase = "offseason";
        return;
      }
      if (state.playoffRound >= 4) {
        state.news.unshift("STATE CHAMPIONS! Stroud finished the job.");
        finalizeSeason(true);
        state.phase = "offseason";
        return;
      }
      state.playoffRound++;
      const labels = ["Round 1","Quarterfinal","Semifinal","State Championship"];
      createUserPlayoffGame(labels[state.playoffRound - 1]);
      state.news.unshift("Stroud advanced to the " + labels[state.playoffRound - 1] + ".");
      practiceWeek();
      updateRecords();
    }

    function finalizeSeason(champ) {
      const t = getTeam(state.userTeamId);
      state.history.unshift({
        year: state.seasonYear,
        wins: t.record.wins,
        losses: t.record.losses,
        districtWins: t.record.districtWins,
        districtLosses: t.record.districtLosses,
        pf: t.record.pf,
        pa: t.record.pa,
        offense: state.settings.offense,
        defense: state.settings.defense,
        champion: champ
      });
      state.records.teamSeasons.push(state.history[0]);
      updateRecords();
    }

    function startNextSeason() {
      offseasonProgression();
      state.seasonYear++;
      state.week = 1;
      state.phase = "regular";
      state.playoffRound = null;
      for (const t of state.teams) {
        t.history.unshift({ year: state.seasonYear - 1, ...t.record });
        t.record = { wins: 0, losses: 0, districtWins: 0, districtLosses: 0, pf: 0, pa: 0 };
        if (t.id !== state.userTeamId) t.power = clamp(t.power + rand(-7, 7), 20, 90);
      }
      for (const p of state.players) p.seasonStats = emptyPlayerStats();
      state.schedule = createSchedule(state.seasonYear, state.teams);
      state.depth = autoDepth(state.players);
      recalcTeamRatings();
      state.news.unshift("New season started. Freshmen arrived. Seniors graduated.");
      saveLocal();
    }

    function offseasonProgression() {
      const graduates = state.players.filter(p => p.grade === "SR");
      for (const p of graduates) updateRecordsForPlayer(p);
      state.players = state.players.filter(p => p.grade !== "SR");
      const gradeUp = { FR: "SO", SO: "JR", JR: "SR" };
      for (const p of state.players) {
        p.grade = gradeUp[p.grade] || p.grade;
        const growthChance = (p.hidden.genetics + p.hidden.workEthic) / 200;
        const hGain = Math.random() < growthChance ? rand(0, 2) : 0;
        const wGain = rand(3, 18) * growthChance;
        p.height = clamp(p.height + hGain, 62, 80);
        p.weight = Math.round(clamp(p.weight + wGain, 120, 330));

        for (const s of VISIBLE_STATS) {
          const ceiling = 58 + p.hidden.genetics * .38 + p.hidden.workEthic * .18;
          const gain = Math.max(0, (p.hidden.workEthic / 100) * Math.random() * 3.8 + (p.hidden.genetics / 100) * Math.random() * 2.2);
          if (p.stats[s] < ceiling) p.stats[s] = round1(clamp(p.stats[s] + gain, 1, 99));
        }
        revealTrait(p, "genetics", rand(8, 16));
        revealTrait(p, "workEthic", rand(8, 16));
        p.notes.unshift("Offseason development completed. Staff has a better read on his body and habits.");
        p.notes = p.notes.slice(0, 14);
      }
      const freshmen = generateFreshmen();
      state.players.push(...freshmen);
      usedNames.clear();
      for (const p of state.players) usedNames.add(p.name);
    }

    function updateRecords() {
      for (const p of state.players) updateRecordsForPlayer(p);
    }

    function updateRecordsForPlayer(p) {
      const seasonKeys = [
        ["passYards","Season passing yards"], ["passTD","Season passing TD"],
        ["rushYards","Season rushing yards"], ["rushTD","Season rushing TD"],
        ["recYards","Season receiving yards"], ["recTD","Season receiving TD"],
        ["tackles","Season tackles"], ["sacks","Season sacks"], ["interceptions","Season INT"]
      ];
      const careerKeys = [
        ["passYards","Career passing yards"], ["passTD","Career passing TD"],
        ["rushYards","Career rushing yards"], ["rushTD","Career rushing TD"],
        ["recYards","Career receiving yards"], ["recTD","Career receiving TD"],
        ["tackles","Career tackles"], ["sacks","Career sacks"], ["interceptions","Career INT"]
      ];
      for (const [key,label] of seasonKeys) {
        const val = p.seasonStats[key] || 0;
        if (!state.records.season[label] || val > state.records.season[label].value) {
          state.records.season[label] = { value: val, player: p.name, year: state.seasonYear };
        }
      }
      for (const [key,label] of careerKeys) {
        const val = p.careerStats[key] || 0;
        if (!state.records.career[label] || val > state.records.career[label].value) {
          state.records.career[label] = { value: val, player: p.name, year: state.seasonYear };
        }
      }
    }

      const g = state.schedule.find(x => x.week === week && (x.homeId === state.userTeamId || x.awayId === state.userTeamId));
      if (!g) return "No Stroud game found.";
      const home = getTeam(g.homeId), away = getTeam(g.awayId);
      return `${home.name} ${g.homeScore}, ${away.name} ${g.awayScore}.`;
    }

    function getLeaders() {
      const cats = [

    function renderRoster() {

        let bv = k === "name" ? b.name : k === "grade" ? gradeValue(b.grade) : k === "position" ? b.position : k === "height" ? b.height : b.stats[k] ?? 0;
        return av > bv ? rosterSort.dir : av < bv ? -rosterSort.dir : 0;
      });

                <tr><td>Career</td><td>${p.careerStats.passYards}/${p.careerStats.passTD}</td><td>${p.careerStats.rushYards}/${p.careerStats.rushTD}</td><td>${p.careerStats.recYards}/${p.careerStats.recTD}</td><td>${p.careerStats.tackles}</td><td>${p.careerStats.sacks}</td><td>${p.careerStats.interceptions}</td></tr>
              </tbody>
            </table>
          </div>
          <div class="card">
            <h3>Position Fits</h3>
            <div class="grid two">
              ${["QB","RB","WR","TE","OL","DL","LB","CB","S","K"].map(pos=>`<div class="record-card"><span>${pos}</span><strong style="float:right">${Math.round(positionFit(p,pos))}</strong><div class="meter"><span style="width:${positionFit(p,pos)}%"></span></div></div>`).join("")}
            </div>
          </div>
        </div>
        <div class="card" style="margin-top:14px;">
          <h3>Player Notes</h3>
          <div class="game-log">${p.notes.map(n=>`<div class="log-line">${n}</div>`).join("") || `<p class="muted">No notes yet.</p>`}</div>
        </div>`;
      modalBackdrop.classList.add("show");
    }

    function traitLine(label, k) {
      const known = Math.round(k.known);
      const range = known <= 1 ? "???" : `${k.min}-${k.max}`;
      return `<div style="margin:10px 0;">
        <div class="between"><span>${label}</span><strong>${range}</strong></div>
        <div class="meter"><span style="width:${known}%"></span></div>
        <div class="muted small">Confidence: ${known}%</div>
      </div>`;
    }

    function toast(msg) {
      const box = document.getElementById("toast");
      const el = document.createElement("div");
      el.textContent = msg;
      box.appendChild(el);
      setTimeout(() => el.remove(), 3400);
    }

    document.getElementById("newSaveBtn").onclick = createNewDynasty;
    document.getElementById("quickSaveBtn").onclick = saveLocal;
    document.getElementById("saveCloudBtn").onclick = saveCloud;
    document.getElementById("loadCloudBtn").onclick = loadCloud;
    document.getElementById("advanceBtn").onclick = advanceWeek;
    document.getElementById("closeModalBtn").onclick = () => modalBackdrop.classList.remove("show");
    document.getElementById("modalBackdrop").onclick = e => { if (e.target.id === "modalBackdrop") modalBackdrop.classList.remove("show"); };

    document.getElementById("exportBtn").onclick = () => {
      if (!state) return toast("No save to export.");
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "hs-football-gm-save.json";
      a.click();
      URL.revokeObjectURL(a.href);
    };

    document.getElementById("importBtn").onclick = () => document.getElementById("importFile").click();
    document.getElementById("importFile").onchange = e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          state = JSON.parse(reader.result);
          migrateState();
          saveLocal();
          render();
          toast("Imported save.");
        } catch {
          toast("Import failed.");
        }
      };
      reader.readAsText(file);
    };

    if (!loadLocal()) createNewDynasty();
    render();
  </script>
</body>
</html>
