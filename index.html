<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HS Football GM</title>
<style>
:root {
  --bg:#05070d;
  --panel:#0f1724;
  --panel2:#162236;
  --panel3:#1e3150;
  --line:#294466;
  --text:#f5f8ff;
  --muted:#94a8c5;
  --blue:#174cff;
  --blue2:#2e7bff;
  --white:#ffffff;
  --gold:#ffd166;
  --green:#48e59b;
  --red:#ff5f6d;
  --shadow:0 18px 50px rgba(0,0,0,.35);
  --radius:18px;
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at 15% 8%, rgba(23,76,255,.35), transparent 33%),
    radial-gradient(circle at 85% 12%, rgba(255,255,255,.12), transparent 28%),
    linear-gradient(140deg,#03050a 0%,#071020 45%,#03050a 100%);
}
button,select,input{font:inherit}
button{
  border:0;
  border-radius:13px;
  padding:10px 13px;
  background:linear-gradient(135deg,var(--blue2),var(--blue));
  color:white;
  cursor:pointer;
  font-weight:900;
  letter-spacing:.01em;
  box-shadow:0 8px 22px rgba(23,76,255,.24);
}
button:hover{filter:brightness(1.1); transform:translateY(-1px)}
button:disabled{opacity:.55;cursor:not-allowed;transform:none}
button.ghost{background:rgba(255,255,255,.04);border:1px solid var(--line);box-shadow:none;color:var(--text)}
button.gold{background:linear-gradient(135deg,#ffd166,#d99d17);color:#14100a}
button.red{background:linear-gradient(135deg,#ff5f6d,#a91525)}
input,select{
  width:100%;
  border:1px solid var(--line);
  border-radius:13px;
  background:#08111f;
  color:var(--text);
  padding:10px 11px;
  outline:none;
}
.app{display:grid;grid-template-columns:292px minmax(0,1fr);min-height:100vh}
.sidebar{
  border-right:1px solid rgba(255,255,255,.1);
  background:rgba(5,7,13,.78);
  backdrop-filter:blur(16px);
  padding:18px;
  position:sticky;
  top:0;
  height:100vh;
  overflow:auto;
}
.brand{display:flex;gap:12px;align-items:center;margin-bottom:18px}
.logoBox{
  width:66px;height:66px;border-radius:18px;display:grid;place-items:center;
  background:linear-gradient(135deg,rgba(23,76,255,.32),rgba(255,255,255,.08));
  border:1px solid rgba(255,255,255,.16);box-shadow:var(--shadow);overflow:hidden;
}
.logoBox img{width:78px;height:78px;object-fit:contain}
.brand h1{font-size:21px;line-height:1;margin:0}
.brand small{color:var(--muted)}
.nav{display:grid;gap:7px;margin:18px 0}
.nav button{
  background:transparent;box-shadow:none;color:var(--muted);text-align:left;
  display:flex;justify-content:space-between;align-items:center;border:1px solid transparent;
}
.nav button.active{color:white;background:linear-gradient(135deg,rgba(23,76,255,.3),rgba(255,255,255,.04));border-color:rgba(46,123,255,.45)}
.sideCard,.card{
  background:linear-gradient(180deg,rgba(15,23,36,.94),rgba(8,17,31,.94));
  border:1px solid rgba(255,255,255,.11);
  border-radius:var(--radius);
  padding:15px;
  box-shadow:var(--shadow);
}
.sideCard{margin-top:12px;box-shadow:none}
.main{padding:22px;min-width:0}
.hero{
  border:1px solid rgba(255,255,255,.12);
  border-radius:24px;
  padding:18px;
  margin-bottom:16px;
  display:flex;align-items:center;justify-content:space-between;gap:14px;
  background:
    linear-gradient(90deg, rgba(23,76,255,.32), rgba(255,255,255,.04)),
    linear-gradient(180deg, rgba(15,23,36,.95), rgba(5,7,13,.95));
  box-shadow:var(--shadow);
  overflow:hidden;
  position:relative;
}

.hero h2{margin:0;font-size:30px;letter-spacing:-.02em}
.hero p{margin:5px 0 0;color:var(--muted)}
.heroActions{display:flex;gap:9px;flex-wrap:wrap;z-index:1}
.grid{display:grid;gap:14px}
.grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}
.grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}
.grid.four{grid-template-columns:repeat(4,minmax(0,1fr))}
.card h3{margin:0 0 11px;font-size:18px}
.muted{color:var(--muted)} .goldText{color:var(--gold)} .greenText{color:var(--green)} .redText{color:var(--red)} .blueText{color:#7eb0ff}
.row{display:flex;gap:9px;align-items:center;flex-wrap:wrap}
.between{display:flex;justify-content:space-between;align-items:center;gap:10px}
.pill{
  display:inline-flex;align-items:center;gap:5px;border:1px solid var(--line);border-radius:999px;
  padding:4px 9px;font-size:12px;color:var(--muted);background:rgba(255,255,255,.04);white-space:nowrap;
}
.pill.good{color:var(--green);border-color:rgba(72,229,155,.35)}
.pill.bad{color:var(--red);border-color:rgba(255,95,109,.35)}
.pill.gold{color:var(--gold);border-color:rgba(255,209,102,.42)}
.pill.blue{color:#9ec5ff;border-color:rgba(46,123,255,.48)}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:9px 8px;border-bottom:1px solid rgba(255,255,255,.08);text-align:left;white-space:nowrap}
th{color:var(--muted);font-weight:900;background:#0d1726;position:sticky;top:0;z-index:1;cursor:pointer}
tr:hover td{background:rgba(255,255,255,.035)}
.tableWrap{overflow:auto;max-height:65vh;border:1px solid rgba(255,255,255,.1);border-radius:15px}
.playerName{font-weight:900;color:#dce8ff;cursor:pointer}
.playerName:hover{color:var(--gold)}
.meter{height:8px;border-radius:999px;background:#050912;border:1px solid rgba(255,255,255,.08);overflow:hidden}
.meter span{display:block;height:100%;background:linear-gradient(90deg,#ff5f6d,#ffd166,#48e59b)}
.newsPaper{
  background:#f5f0df;color:#1f1a12;border-radius:18px;padding:18px;border:2px solid #d8c99d;
  box-shadow:0 18px 50px rgba(0,0,0,.35);
}
.newsPaper h3{font-family:Georgia,serif;font-size:28px;margin:0;border-bottom:3px double #1f1a12;padding-bottom:8px}
.newsPaper h4{font-family:Georgia,serif;font-size:20px;margin:14px 0 6px}
.newsPaper p,.newsPaper li{color:#312918}
.newsGrid{display:grid;grid-template-columns:1.2fr .8fr;gap:14px}
.story{background:rgba(0,0,0,.04);border:1px solid rgba(0,0,0,.12);border-radius:12px;padding:10px}
.rankNum{font-weight:900;color:var(--gold);min-width:26px;display:inline-block}
.scheduleGame{display:grid;grid-template-columns:88px 1fr auto;gap:10px;align-items:center;padding:11px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);border-radius:14px}
.depthGrid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}
.posRow{display:grid;grid-template-columns:62px minmax(0,1fr) 58px;gap:8px;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.07)}
.modalBg{position:fixed;inset:0;background:rgba(0,0,0,.72);display:none;align-items:center;justify-content:center;padding:18px;z-index:50}
.modalBg.show{display:flex}
.modal{width:min(1120px,100%);max-height:92vh;overflow:auto;background:#08111f;border:1px solid rgba(255,255,255,.15);border-radius:22px;box-shadow:0 30px 90px rgba(0,0,0,.62)}
.modalHead{position:sticky;top:0;background:#08111f;border-bottom:1px solid rgba(255,255,255,.12);padding:15px;display:flex;justify-content:space-between;gap:12px;z-index:2}
.modalBody{padding:15px}
.statGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
.statLine{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:12px;padding:9px;display:flex;justify-content:space-between;gap:8px}
.toast{position:fixed;right:18px;bottom:18px;display:grid;gap:8px;z-index:99}
.toast div{background:#061020;border:1px solid var(--line);border-radius:13px;padding:10px 12px;box-shadow:var(--shadow)}
.small{font-size:12px} .hide{display:none!important}
@media(max-width:980px){
  .app{grid-template-columns:1fr}
  .sidebar{position:static;height:auto}
  .nav{grid-template-columns:repeat(2,minmax(0,1fr))}
  .grid.two,.grid.three,.grid.four,.depthGrid,.newsGrid{grid-template-columns:1fr}
  .hero{align-items:flex-start;flex-direction:column}
  .main{padding:14px}
}
</style>

function norm(pos){if(["WR1","WR2","WR3"].includes(pos))return"WR";if(["LT","LG","C","RG","RT"].includes(pos))return"OL";if(["LE","RE","DT1","DT2"].includes(pos))return"DL";if(["OLB1","MLB","OLB2"].includes(pos))return"LB";if(["CB1","CB2"].includes(pos))return"CB";if(["FS","SS"].includes(pos))return"S";return pos;}
function fit(p,pos,quarter=1){
  const s=p.stats, n=norm(pos); let score=50;
  const wt=(pairs)=>pairs.reduce((a,[k,w])=>a+(s[k]||0)*w,0)/pairs.reduce((a,x)=>a+x[1],0);
  if(n==="QB")score=wt([["armStrength",2],["throwAccuracy",3],["vision",2],["agility",1],["ballCarrying",1]])+p.hidden.footballIQ*.10;
  else if(n==="RB")score=wt([["speed",2],["acceleration",2],["agility",2],["ballCarrying",3],["vision",1],["strength",1]]);
  else if(n==="FB")score=wt([["strength",2],["blocking",3],["ballCarrying",1],["tackling",1]])+Math.min(p.weight,235)*.045;
  else if(n==="WR")score=wt([["speed",3],["acceleration",2],["agility",2],["catching",3],["vision",1]]);
  else if(n==="TE")score=wt([["catching",2],["blocking",3],["strength",2],["speed",1]])+Math.min(p.weight,245)*.035;
  else if(n==="OL")score=wt([["strength",3],["blocking",4],["stamina",1]])+Math.min(p.weight,310)*.06;
  else if(n==="DL")score=wt([["strength",3],["tackling",2],["pursuit",1],["stamina",1]])+Math.min(p.weight,290)*.055;
  else if(n==="LB")score=wt([["tackling",3],["pursuit",3],["strength",1],["speed",1],["vision",1]])+p.hidden.footballIQ*.07;
  else if(n==="CB")score=wt([["speed",3],["acceleration",2],["agility",2],["coverage",3],["tackling",1]]);
  else if(n==="S")score=wt([["speed",2],["coverage",2],["tackling",2],["pursuit",2],["vision",2]])+p.hidden.footballIQ*.08;
  else if(["K","P"].includes(n))score=wt([["kickPower",3],["kickAccuracy",3]]);
  else if(["KR","PR"].includes(n))score=wt([["speed",3],["acceleration",2],["agility",2],["ballCarrying",2],["vision",1]]);
  if(p.hidden.gamer) score += 4;
  const twoWay = p.assign.offense && p.assign.defense;
  let mod = twoWay ? (1 - Math.max(0,quarter-1)*.02) : 1;
  if(twoWay && p.hidden.gamer) mod += .01*(quarter-1);

  return clamp(score*mod,1,99);
}
function recommendPositions(p){

function autoDepth(){

      if(best){d[pos]=best.id;used[group[1]].add(best.id);best.assign[group[1]]=pos;}

}
function enforceDepth(pos,pid){

  const p=state.players.find(x=>x.id===pid);

function recalcTeams(){

function schemeBonus(side){

function simScore(home,away,playoff=false){
  const hOff=home.offenseRating, aOff=away.offenseRating, hDef=home.defenseRating, aDef=away.defenseRating;
  const hAdv=2.2;
  const hGap=(hOff-aDef)+hAdv, aGap=(aOff-hDef);
  const powerGap=(home.power-away.power)+hAdv;
  let hBase=23+hGap*.38+powerGap*.18;
  let aBase=22+aGap*.38-powerGap*.18;
  if(Math.abs(powerGap)>28){ if(powerGap>0){hBase+=11;aBase-=8} else {aBase+=11;hBase-=8} }
  let h=round(clamp(hBase+bell(0,7,-18,18),0,70));
  let a=round(clamp(aBase+bell(0,7,-18,18),0,70));
  if(Math.abs(powerGap)>35) {
    if(powerGap>0){h=clamp(rand(42,63)+round((powerGap-35)*.25),35,76);a=clamp(rand(0,14)-round((powerGap-35)*.08),0,21);}
    else {a=clamp(rand(42,63)+round((-powerGap-35)*.25),35,76);h=clamp(rand(0,14)-round((-powerGap-35)*.08),0,21);}
  }
  if(h===a) Math.random()<.5?h+=rand(1,7):a+=rand(1,7);
  return [h,a];
}
function simGame(g){

function applyResult(home,away,hs,as,district){

  home.teamStats.points+=hs;home.teamStats.allowed+=as;away.teamStats.points+=as;away.teamStats.allowed+=hs;

function gameStats(home,away,hs,as,g){
  function one(team,opp,pts,oppPts){
    const passRate = ["Air Raid","Spread","Pro Style"].includes(team.offense) ? rand(45,60)/100 : rand(22,42)/100;
    const totalYards=clamp(190 + pts*7 + (team.offenseRating-opp.defenseRating)*3 + bell(0,45,-90,120),60,620);
    let pass=round(totalYards*passRate + bell(0,25,-65,65));
    let rush=round(totalYards-pass);
    if(pts>=55 && team.power-opp.power>28){rush+=rand(45,130); pass=Math.min(pass,rand(90,260));}
    pass=clamp(pass,0,430); rush=clamp(rush,0,430);
    const passTD=clamp(round(pts/14 + (pass>220?1:0) + rand(-1,1)),0,6);
    const rushTD=clamp(Math.floor(pts/7)-passTD,0,7);
    return {passYards:pass,rushYards:rush,passTD,rushTD,totalYards:pass+rush,turnovers:rand(0,team.offenseRating<45?4:2)};
  }
  return {home:one(home,away,hs,as),away:one(away,home,as,hs)};
}
function applyPlayerStats(g,st){

  if(stroudGame) {
    const home=getTeam(stroudGame.homeId), away=getTeam(stroudGame.awayId);
    const won=(stroudGame.homeId==="team_stroud"&&stroudGame.homeScore>stroudGame.awayScore)||(stroudGame.awayId==="team_stroud"&&stroudGame.awayScore>stroudGame.homeScore);
    const margin=Math.abs(stroudGame.homeScore-stroudGame.awayScore);
    headline = won ? (margin>=28?"Tigers Roll on Friday Night":margin<=7?"Tigers Survive Late Scare":"Tigers Take Care of Business") : (margin<=7?"Tigers Fall in Heartbreaker":"Tigers Come Up Short");
    body = `${home.name} ${stroudGame.homeScore}, ${away.name} ${stroudGame.awayScore}. `;
    if(won&&margin>=35) body += "Stroud controlled the line of scrimmage early and turned the game into a runaway before halftime.";
    else if(won&&margin<=7) body += "The Tigers needed late execution and a few tough snaps to escape with the win.";
    else if(won) body += "Stroud leaned on its system, avoided the big mistake, and stacked another important result.";
    else if(margin<=7) body += "Stroud had chances late but could not finish the final drive.";
    else body += "The Tigers struggled to keep pace once the game started slipping away.";
    topPerformers = getLeaders().slice(0,4);
  }
  const rare = state.players.flatMap(p=>p.notes.slice(0,1).map(n=>({name:p.name,n}))).filter(x=>/lights|pressure|clutch|Friday|adjustments/.test(x.n)).slice(0,3);
  state.news.unshift(headline);
  state.news=state.news.slice(0,40);
  return {week,headline,body,topPerformers,around:around.map(g=>({home:getTeam(g.homeId).name,away:getTeam(g.awayId).name,hs:g.homeScore,as:g.awayScore,district:g.district})),rankings:rankTeams().slice(0,10),leaders:stateLeaders(),rare};
}
function rankTeams(){
  return [...state.teams].map(t=>{
    const gp=t.record.wins+t.record.losses;
    const win=gp?t.record.wins/gp:.5;
    const pd=gp?(t.record.pf-t.record.pa)/gp:0;
    const score=win*42+t.power*.32+pd*.42+(t.record.districtWins*1.2);
    return {id:t.id,name:t.name,record:`${t.record.wins}-${t.record.losses}`,score:r1(score),power:t.power};
  }).sort((a,b)=>b.score-a.score).map((x,i)=>({...x,rank:i+1}));
}
function stateLeaders(){
  const cats=[["passYards","Passing"],["rushYards","Rushing"],["recYards","Receiving"],["tackles","Tackles"],["sacks","Sacks"],["interceptions","Interceptions"]];
  const stroud=state.players.map(p=>({school:"Stroud",player:p.name,grade:p.grade,stats:p.seasonStats}));
  const fake=[];
  for(const t of state.teams.filter(t=>t.id!=="team_stroud")) {
    const gp=t.record.wins+t.record.losses||1;
    fake.push({school:t.name,player:choice(FIRST)+" "+choice(LAST),grade:choice(["SO","JR","SR"]),stats:{passYards:round((t.offenseRating*22+rand(-300,450))*gp/10),rushYards:round((t.offenseRating*20+rand(-250,520))*gp/10),recYards:round((t.offenseRating*12+rand(-150,300))*gp/10),tackles:round((45+rand(0,65))*gp/10),sacks:round(rand(0,10)*gp/10),interceptions:round(rand(0,6)*gp/10)}});
  }
  const all=[...stroud,...fake];
  const out={};
  for(const [k,label] of cats) out[label]=all.sort((a,b)=>(b.stats[k]||0)-(a.stats[k]||0)).slice(0,10).map(x=>({name:x.player,school:x.school,grade:x.grade,value:Math.max(0,x.stats[k]||0)}));
  return out;
}

function seedPlayoffs(){
  const top=rankTeams().slice(0,16).map(r=>getTeam(r.id));
  const stroud=getTeam("team_stroud");
  if(!top.some(t=>t.id==="team_stroud") && (stroud.record.wins>=6||stroud.record.districtWins>=4)) top[top.length-1]=stroud;
  state.playoffBracket=[];
  const seeds=top.slice(0,16);
  for(let i=0;i<8;i++) state.playoffBracket.push(makePlayoffGame(11,seeds[i].id,seeds[15-i].id,"Round 1"));
  state.phase="playoffs"; state.playoffRound=1;
  state.paper={week:11,headline:"Playoff Bracket Set",body:"Sixteen teams remain. Four rounds. Single elimination. One state champion.",topPerformers:[],around:[],rankings:rankTeams().slice(0,10),leaders:stateLeaders(),rare:[]};
}
function makePlayoffGame(week,homeId,awayId,label){return {id:id("po"),year:state.year,week,homeId,awayId,district:false,played:false,homeScore:null,awayScore:null,stats:null,playoff:true,label};}
function runPlayoffRound(){
  const labels=["Round 1","Quarterfinal","Semifinal","State Championship"];
  const roundGames=state.playoffBracket.filter(g=>g.label===labels[state.playoffRound-1]&&!g.played);
  for(const g of roundGames) simGame(g);
  const winners=roundGames.map(g=>getTeam(g.homeScore>g.awayScore?g.homeId:g.awayId));
  const stroudAlive=winners.some(t=>t.id==="team_stroud");
  state.paper=makePlayoffPaper(labels[state.playoffRound-1],roundGames,winners);
  if(state.playoffRound===4) {
    const champ=winners[0];
    finalizeSeason(champ.id==="team_stroud");
    state.phase="offseason";
    state.news.unshift(`${champ.name} wins the state championship.`);
    return;
  }
  const nextLabel=labels[state.playoffRound];
  for(let i=0;i<winners.length;i+=2) state.playoffBracket.push(makePlayoffGame(11+state.playoffRound,winners[i].id,winners[i+1].id,nextLabel));
  state.playoffRound++;
  weeklyPractice();
}
function makePlayoffPaper(label,games,winners){
  const sg=games.find(g=>g.homeId==="team_stroud"||g.awayId==="team_stroud");
  let headline=`${label} Complete`;
  let body="The bracket narrowed again as playoff pressure ended seasons across Class 2A-II.";
  if(sg) {
    const home=getTeam(sg.homeId), away=getTeam(sg.awayId), won=(sg.homeId==="team_stroud"&&sg.homeScore>sg.awayScore)||(sg.awayId==="team_stroud"&&sg.awayScore>sg.homeScore);
    headline = won ? (label==="State Championship"?"STROUD WINS STATE":"Tigers Advance") : "Tigers' Playoff Run Ends";
    body = `${home.name} ${sg.homeScore}, ${away.name} ${sg.awayScore}. ` + (won ? "Stroud kept the dream alive with disciplined football when the lights were brightest." : "Stroud battled, but the season ended one round short of the next step.");
  }
  return {week:state.week,headline,body,topPerformers:getLeaders().slice(0,4),around:games.map(g=>({home:getTeam(g.homeId).name,away:getTeam(g.awayId).name,hs:g.homeScore,as:g.awayScore,district:false})),rankings:rankTeams().slice(0,10),leaders:stateLeaders(),rare:[]};
}
function finalizeSeason(champ){
  generateAwards(champ);
  const t=getTeam("team_stroud");
  state.history.unshift({year:state.year,wins:t.record.wins,losses:t.record.losses,districtWins:t.record.districtWins,districtLosses:t.record.districtLosses,pf:t.record.pf,pa:t.record.pa,offense:state.settings.offense,defense:state.settings.defense,stateChampion:champ});
}
function generateAwards(champ){
  const candidates=state.players.map(p=>({p,score:(p.seasonStats.passYards*.012+p.seasonStats.rushYards*.018+p.seasonStats.recYards*.018+p.seasonStats.tackles*.7+p.seasonStats.sacks*5+p.seasonStats.interceptions*6+p.seasonStats.passTD*7+p.seasonStats.rushTD*7+p.seasonStats.recTD*7)+(p.hidden.gamer?12:0)+(p.hidden.clutch?10:0)})).sort((a,b)=>b.score-a.score);
  const awards=[];
  if(candidates[0]) awards.push(["State MVP",candidates[0].p]);
  const off=[...state.players].sort((a,b)=>((b.seasonStats.passYards+b.seasonStats.rushYards+b.seasonStats.recYards)-(a.seasonStats.passYards+a.seasonStats.rushYards+a.seasonStats.recYards)))[0];
  const def=[...state.players].sort((a,b)=>((b.seasonStats.tackles*2+b.seasonStats.sacks*8+b.seasonStats.interceptions*9)-(a.seasonStats.tackles*2+a.seasonStats.sacks*8+a.seasonStats.interceptions*9)))[0];
  const fr=[...state.players].filter(p=>p.grade==="FR").sort((a,b)=>(b.seasonStats.games-a.seasonStats.games||fit(b,b.position)-fit(a,a.position)))[0];
  if(off)awards.push(["State Offensive Player of the Year",off]);
  if(def)awards.push(["State Defensive Player of the Year",def]);
  if(fr)awards.push(["Freshman of the Year",fr]);
  if(champ) awards.push(["Coach of the Year","Stroud Staff"]);
  const allDistrict=candidates.slice(0,12).map(x=>x.p);
  const allState=candidates.slice(0,6).map(x=>x.p);
  for(const [label,p] of awards) if(typeof p!=="string") p.awards.push(`${state.year} ${label}`);
  for(const p of allDistrict) p.awards.push(`${state.year} All-District`);
  for(const p of allState) p.awards.push(`${state.year} All-State`);
  state.awards.unshift({year:state.year,awards:awards.map(([label,p])=>({label,winner:typeof p==="string"?p:p.name})),allDistrict:allDistrict.map(p=>p.name),allState:allState.map(p=>p.name)});
}
function startNextSeason(){
  offseason();
  state.year++; state.week=1; state.phase="regular"; state.playoffRound=0; state.playoffBracket=[];
  for(const t of state.teams){t.history.unshift({year:state.year-1,...t.record});t.record={wins:0,losses:0,districtWins:0,districtLosses:0,pf:0,pa:0};t.teamStats={passYards:0,rushYards:0,points:0,allowed:0}; if(t.id!=="team_stroud")t.power=clamp(t.power+rand(-8,8),18,94);}
  for(const p of state.players)p.seasonStats=emptyStats();
  state.depth=autoDepth(); state.schedule=createSchedule(); recalcTeams(); state.rankings=rankTeams();
  state.paper={week:0,headline:"New Season Opens in Stroud",body:"Freshmen have arrived, seniors are gone, and the Tigers are back to chasing state.",topPerformers:[],around:[],rankings:state.rankings.slice(0,10),leaders:stateLeaders(),rare:[]};

function offseason(){
  state.players=state.players.filter(p=>p.grade!=="SR");
  for(const p of state.players) {
    p.grade={FR:"SO",SO:"JR",JR:"SR"}[p.grade]||p.grade;
    if(Math.random()<(p.hidden.genetics+p.hidden.workEthic)/210)p.height=clamp(p.height+rand(0,2),62,80);
    p.weight=round(clamp(p.weight+rand(3,16)*(p.hidden.genetics+p.hidden.workEthic)/190,120,330));
    for(const s of STATS){const ceiling=58+p.hidden.genetics*.36+p.hidden.workEthic*.18; const gain=Math.random()*4.2*(p.hidden.workEthic/100)+Math.random()*2.2*(p.hidden.genetics/100); if(p.stats[s]<ceiling)p.stats[s]=r1(clamp(p.stats[s]+gain,1,99));}
    reveal(p,"genetics",rand(9,17)); reveal(p,"workEthic",rand(9,17));
    p.notes.unshift("Offseason development is complete. Coaches have a better read on his body and habits.");
  }
  state.players.push(...generateFreshmen());
}
function updateRecords(){
  for(const p of state.players) {
    for(const [k,l] of [["passYards","Passing yards"],["passTD","Passing TD"],["rushYards","Rushing yards"],["rushTD","Rushing TD"],["recYards","Receiving yards"],["recTD","Receiving TD"],["tackles","Tackles"],["sacks","Sacks"],["interceptions","Interceptions"]]) {
      const sv=p.seasonStats[k]||0, cv=p.careerStats[k]||0;
      if(!state.records.season[l]||sv>state.records.season[l].value)state.records.season[l]={value:sv,player:p.name,year:state.year};
      if(!state.records.career[l]||cv>state.records.career[l].value)state.records.career[l]={value:cv,player:p.name,year:state.year};
    }
  }
}

function paperMini(){if(!state.paper)return `<p class="muted">Advance a week to generate the Friday Night Paper.</p>`;return `<h2 class="goldText" style="margin:0">${state.paper.headline}</h2><p class="muted">${state.paper.body}</p><button class="ghost" onclick="window.__goPaper()">Read paper</button>`}
window.__goPaper=()=>{view="newspaper";render();}
function rankingList(list){return list.map(r=>`<div class="between" style="padding:6px 0;border-bottom:1px solid rgba(255,255,255,.07)"><span><span class="rankNum">#${r.rank}</span>${r.name}</span><span class="pill">${r.record}</span></div>`).join("");}
function getLeaders(){const cats=[["passYards","Passing"],["rushYards","Rushing"],["recYards","Receiving"],["tackles","Tackles"]];return cats.map(([k,l])=>{const p=[...state.players].sort((a,b)=>(b.seasonStats[k]||0)-(a.seasonStats[k]||0))[0];return {label:l,name:p?.name||"-",value:p?.seasonStats[k]||0};});}

function roster(){
  let ps=[...state.players]; const k=sort.key;
  ps.sort((a,b)=>{let av=k==="name"?a.name:k==="grade"?gradeVal(a.grade):k==="height"?a.height:k==="weight"?a.weight:k==="pos"?a.position:a.stats[k]||0;let bv=k==="name"?b.name:k==="grade"?gradeVal(b.grade):k==="height"?b.height:k==="weight"?b.weight:k==="pos"?b.position:b.stats[k]||0;return av>bv?sort.dir:av<bv?-sort.dir:0;});
  const heads=[["name","Name"],["grade","Yr"],["pos","Rec"],["height","Ht"],["weight","Wt"],["speed","Spd"],["strength","Str"],["agility","Agi"],["armStrength","Arm"],["throwAccuracy","Acc"],["catching","Cat"],["ballCarrying","Carry"],["blocking","Blk"],["tackling","Tkl"],["coverage","Cov"],["vision","Vis"]];
  document.getElementById("view").innerHTML=`<div class="card"><div class="between"><h3>Roster</h3><span class="pill blue">${ps.length} players</span></div><div class="tableWrap"><table><thead><tr>${heads.map(h=>`<th data-sort="${h[0]}">${h[1]}</th>`).join("")}</tr></thead><tbody>${ps.map(p=>`<tr><td><span class="playerName" data-p="${p.id}">${p.name}</span></td><td>${p.grade}</td><td>${recommendPositions(p).join("/")}</td><td>${fmtHt(p.height)}</td><td>${p.weight}</td><td>${p.stats.speed}</td><td>${p.stats.strength}</td><td>${p.stats.agility}</td><td>${p.stats.armStrength}</td><td>${p.stats.throwAccuracy}</td><td>${p.stats.catching}</td><td>${p.stats.ballCarrying}</td><td>${p.stats.blocking}</td><td>${p.stats.tackling}</td><td>${p.stats.coverage}</td><td>${p.stats.vision}</td></tr>`).join("")}</tbody></table></div></div>`;
  document.querySelectorAll("[data-p]").forEach(x=>x.onclick=()=>openPlayer(x.dataset.p));
  document.querySelectorAll("[data-sort]").forEach(x=>x.onclick=()=>{if(sort.key===x.dataset.sort)sort.dir*=-1;else sort={key:x.dataset.sort,dir:1};roster();});
}
function depth(){
  const opts=state.players.sort((a,b)=>a.name.localeCompare(b.name)).map(p=>`<option value="${p.id}">${p.name} • ${p.grade} • ${fmtHt(p.height)} ${p.weight}</option>`).join("");
  const sec=(title,positions)=>`<div class="card"><h3>${title}</h3>${positions.map(pos=>{const p=getPlayer(state.depth[pos]);return `<div class="posRow"><strong>${pos}</strong><select data-depth="${pos}"><option value="">Empty</option>${opts}</select><span class="pill ${p?fitClass(fit(p,pos)):""}">${p?round(fit(p,pos)):"-"}</span></div>`}).join("")}</div>`;
  document.getElementById("view").innerHTML=`<div class="row" style="margin-bottom:14px"><button id="autoDepth">Auto Recommend</button><button class="ghost" id="clearDepth">Clear</button></div><div class="depthGrid">${sec("Offense",OFF_POS)}${sec("Defense",DEF_POS)}${sec("Special Teams",ST_POS)}</div>`;
  document.querySelectorAll("[data-depth]").forEach(sel=>{sel.value=state.depth[sel.dataset.depth]||"";sel.onchange=()=>{state.depth[sel.dataset.depth]=sel.value||null;if(sel.value)enforceDepth(sel.dataset.depth,sel.value);recalcTeams();saveLocal();depth();};});
  document.getElementById("autoDepth").onclick=()=>{state.depth=autoDepth();recalcTeams();saveLocal();depth();};
  document.getElementById("clearDepth").onclick=()=>{for(const p of state.players)p.assign={offense:null,defense:null,special:null};for(const pos of ALL_POS)state.depth[pos]=null;recalcTeams();saveLocal();depth();};
}
function fitClass(v){return v>=72?"good":v<=45?"bad":"gold";}
function schemes(){
  document.getElementById("view").innerHTML=`<div class="grid two"><div class="card"><h3>Systems</h3><label class="muted small">Offense</label><select id="offSel">${OFFENSES.map(o=>`<option>${o}</option>`).join("")}</select><br><br><label class="muted small">Defense</label><select id="defSel">${DEFENSES.map(o=>`<option>${o}</option>`).join("")}</select><br><br><button id="saveScheme">Save Systems</button></div><div class="card"><h3>Practice</h3><label class="muted small">Team Focus</label><select id="teamFocus">${["Position Drills","Weight Room","Conditioning","Film Study","Scrimmage"].map(o=>`<option>${o}</option>`).join("")}</select><br><br><p class="muted">Practice improves ratings and reveals hidden traits. Scrimmage helps expose Gamer/Clutch. Film helps expose IQ.</p><button id="savePractice">Save Practice</button></div></div>`;
  offSel.value=state.settings.offense;defSel.value=state.settings.defense;teamFocus.value=state.settings.teamFocus;
  saveScheme.onclick=()=>{state.settings.offense=offSel.value;state.settings.defense=defSel.value;recalcTeams();saveLocal();render();};
  savePractice.onclick=()=>{state.settings.teamFocus=teamFocus.value;saveLocal();toast("Practice saved.");};
}
function newspaper(){
  const p=state.paper;
  document.getElementById("view").innerHTML=p?`<div class="newsPaper"><h3>Friday Night Football</h3><div class="newsGrid"><div><h4>${p.headline}</h4><p>${p.body}</p><h4>Top Tigers</h4>${p.topPerformers?.length?p.topPerformers.map(x=>`<div class="story"><strong>${x.name}</strong><br>${x.label}: ${x.value}</div>`).join(""):"<p>No Stroud stats yet.</p>"}<h4>Coach Notes</h4>${p.rare?.length?p.rare.map(x=>`<div class="story"><strong>${x.name}</strong>: ${x.n}</div>`).join(""):"<p>Nothing rare surfaced this week.</p>"}</div><div><h4>Around The State</h4>${p.around.map(g=>`<div class="story"><strong>${g.home} ${g.hs}, ${g.away} ${g.as}</strong><br>${g.district?"District game":"Non-district/playoff"}</div>`).join("")||"<p>No other finals.</p>"}<h4>Top 10</h4>${p.rankings.map(r=>`<div><span class="rankNum">#${r.rank}</span>${r.name} <span style="float:right">${r.record}</span></div>`).join("")}</div></div></div>`:`<div class="card"><h3>No Paper Yet</h3><p class="muted">Advance a week.</p></div>`;
}
function rankings(){
  const leaders=state.leaders?.length?state.leaders:stateLeaders();
  document.getElementById("view").innerHTML=`<div class="grid two"><div class="card"><h3>State Top 25</h3>${rankingList(rankTeams().slice(0,25))}</div><div class="card"><h3>State Leaders</h3>${Object.entries(leaders).map(([cat,list])=>`<h4>${cat}</h4>${list.slice(0,5).map((x,i)=>`<div class="between"><span>${i+1}. ${x.name} <span class="muted">(${x.school})</span></span><strong>${x.value}</strong></div>`).join("")}`).join("")}</div></div>`;
}
function schedule(){
  const games=[...state.schedule.filter(g=>g.homeId==="team_stroud"||g.awayId==="team_stroud"),...(state.playoffBracket||[]).filter(g=>g.homeId==="team_stroud"||g.awayId==="team_stroud")].sort((a,b)=>a.week-b.week);
  document.getElementById("view").innerHTML=`<div class="grid">${games.map(g=>{const h=getTeam(g.homeId),a=getTeam(g.awayId);return `<div class="scheduleGame"><span class="pill ${g.playoff?"gold":"blue"}">${g.label||"Week "+g.week}</span><div><strong>${g.played?`${h.name} ${g.homeScore} - ${a.name} ${g.awayScore}`:`${h.name} vs ${a.name}`}</strong><br><span class="muted small">${g.district?"District":"Non-district/Playoff"}</span></div><span class="pill">${g.played?"Final":"Upcoming"}</span></div>`}).join("")}</div>`;
}
function standings(){
  document.getElementById("view").innerHTML=`<div class="grid two">${Object.keys(DISTRICTS).map(d=>{const teams=state.teams.filter(t=>t.district===d).sort((a,b)=>b.record.districtWins-a.record.districtWins||b.record.wins-a.record.wins||(b.record.pf-b.record.pa)-(a.record.pf-a.record.pa));return `<div class="card"><h3>District ${d}</h3><table><thead><tr><th>Team</th><th>Overall</th><th>District</th><th>PF</th><th>PA</th></tr></thead><tbody>${teams.map(t=>`<tr><td><strong class="${t.id==="team_stroud"?"goldText":""}">${t.name}</strong></td><td>${t.record.wins}-${t.record.losses}</td><td>${t.record.districtWins}-${t.record.districtLosses}</td><td>${t.record.pf}</td><td>${t.record.pa}</td></tr>`).join("")}</tbody></table></div>`}).join("")}</div>`;
}
function awards(){
  document.getElementById("view").innerHTML=`<div class="grid">${state.awards.map(a=>`<div class="card"><h3>${a.year} Awards</h3><div class="grid two"><div>${a.awards.map(x=>`<div class="record"><strong>${x.label}</strong><br><span class="goldText">${x.winner}</span></div>`).join("<br>")}</div><div><h4>All-District</h4><p>${a.allDistrict.join(", ")}</p><h4>All-State</h4><p>${a.allState.join(", ")}</p></div></div></div>`).join("")||`<div class="card"><h3>No Awards Yet</h3><p class="muted">Complete a season.</p></div>`}</div>`;
}
function records(){
  const rec=(title,obj)=>`<div class="card"><h3>${title}</h3><div class="grid two">${Object.entries(obj).map(([k,v])=>`<div class="story" style="background:rgba(255,255,255,.04);color:white;border-color:rgba(255,255,255,.1)"><span class="muted small">${k}</span><br><strong>${v.value}</strong><br>${v.player} <span class="muted">${v.year}</span></div>`).join("")||"<p class='muted'>No records.</p>"}</div></div>`;
  document.getElementById("view").innerHTML=`<div class="grid two">${rec("Season Records",state.records.season)}${rec("Career Records",state.records.career)}</div><div class="card" style="margin-top:14px"><h3>Program History</h3><table><thead><tr><th>Year</th><th>Record</th><th>District</th><th>PF</th><th>PA</th><th>Result</th></tr></thead><tbody>${state.history.map(h=>`<tr><td>${h.year}</td><td>${h.wins}-${h.losses}</td><td>${h.districtWins}-${h.districtLosses}</td><td>${h.pf}</td><td>${h.pa}</td><td>${h.stateChampion?"State Champs":"Finished"}</td></tr>`).join("")||"<tr><td colspan='6' class='muted'>No seasons complete.</td></tr>"}</tbody></table></div>`;
}

function openPlayer(pid){
  const p=getPlayer(pid); if(!p)return;
  document.getElementById("modalTitle").textContent=p.name;
  document.getElementById("modalSub").textContent=`${p.grade} • ${fmtHt(p.height)} • ${p.weight} lbs • Recommended: ${recommendPositions(p).join(", ")}`;
  const trait=(label,k)=>`<div style="margin:10px 0"><div class="between"><span>${label}</span><strong>${k.known<2?"???":k.min+"-"+k.max}</strong></div><div class="meter"><span style="width:${k.known}%"></span></div><div class="muted small">Confidence ${round(k.known)}%</div></div>`;
  document.getElementById("modalBody").innerHTML=`<div class="grid two"><div class="card"><h3>Ratings</h3><div class="statGrid">${STATS.map(s=>`<div class="statLine"><span>${LABEL[s]}</span><strong>${p.stats[s]}</strong></div>`).join("")}</div></div><div class="card"><h3>Hidden Trait Read</h3>${trait("Gamer",p.knowledge.gamer)}${trait("Clutch",p.knowledge.clutch)}${trait("Football IQ",p.knowledge.footballIQ)}${trait("Work Ethic",p.knowledge.workEthic)}${trait("Genetics",p.knowledge.genetics)}</div></div><div class="grid two" style="margin-top:14px"><div class="card"><h3>Position Fit</h3><div class="grid two">${["QB","RB","WR","TE","OL","DL","LB","CB","S","K"].map(pos=>`<div class="story" style="background:rgba(255,255,255,.04);color:white;border-color:rgba(255,255,255,.1)"><strong>${pos}</strong><span style="float:right">${round(fit(p,pos))}</span><div class="meter"><span style="width:${fit(p,pos)}%"></span></div></div>`).join("")}</div></div><div class="card"><h3>Stats & Awards</h3><p><strong>Season:</strong> Pass ${p.seasonStats.passYards}/${p.seasonStats.passTD}, Rush ${p.seasonStats.rushYards}/${p.seasonStats.rushTD}, Rec ${p.seasonStats.recYards}/${p.seasonStats.recTD}, Tkl ${p.seasonStats.tackles}</p><p><strong>Career:</strong> Pass ${p.careerStats.passYards}, Rush ${p.careerStats.rushYards}, Rec ${p.careerStats.recYards}, Tkl ${p.careerStats.tackles}</p><p>${p.awards.map(a=>`<span class="pill gold">${a}</span>`).join(" ")||"<span class='muted'>No awards yet.</span>"}</p></div></div><div class="card" style="margin-top:14px"><h3>Coach Notes</h3>${p.notes.map(n=>`<div class="story" style="background:rgba(255,255,255,.04);color:white;border-color:rgba(255,255,255,.1)">${n}</div>`).join("")}</div>`;
  document.getElementById("modalBg").classList.add("show");
}

document.getElementById("googleBtn").onclick=()=>signInWithPopup(auth,provider).then(()=>toast("Google signed in.")).catch(e=>toast("Google sign-in failed: "+e.message));
document.getElementById("guestBtn").onclick=()=>signInAnonymously(auth).then(()=>toast("Guest signed in.")).catch(e=>toast("Guest failed: "+e.message));
document.getElementById("newBtn").onclick=createNew;
document.getElementById("advanceBtn").onclick=advanceWeek;
document.getElementById("localSaveBtn").onclick=()=>{saveLocal();toast("Saved locally.");};
document.getElementById("cloudSaveBtn").onclick=saveCloud;
document.getElementById("cloudLoadBtn").onclick=loadCloud;
document.getElementById("closeModal").onclick=()=>document.getElementById("modalBg").classList.remove("show");
document.getElementById("modalBg").onclick=e=>{if(e.target.id==="modalBg")document.getElementById("modalBg").classList.remove("show");};
document.getElementById("exportBtn").onclick=()=>{if(!state)return;const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="hs-football-gm-save.json";a.click();URL.revokeObjectURL(a.href);};
document.getElementById("importBtn").onclick=()=>document.getElementById("importFile").click();
document.getElementById("importFile").onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{state=JSON.parse(r.result);migrate();saveLocal();render();toast("Imported save.");}catch{toast("Import failed.");}};r.readAsText(f);};
if(!loadLocal()) createNew(); else render();
</script>
</body>
</html>
